name: CI

on:
  push:
    branches: [main, "task-*"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 src/ tests/ --max-line-length=100 --exclude=__pycache__

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short

      - name: Validate notebook structure
        run: |
          python -c "
          import json, sys
          with open('notebooks/eda.ipynb') as f:
              nb = json.load(f)
          assert nb['nbformat'] >= 4, 'Notebook format too old'
          assert len(nb['cells']) > 0, 'Notebook has no cells'
          code_cells = [c for c in nb['cells'] if c['cell_type'] == 'code']
          assert len(code_cells) > 0, 'Notebook has no code cells'
          print(f'Notebook OK: {len(nb[\"cells\"])} cells ({len(code_cells)} code cells)')
          "

      - name: Check required project files exist
        run: |
          python -c "
          from pathlib import Path
          required = [
              'README.md',
              'requirements.txt',
              'Dockerfile',
              'docker-compose.yml',
              '.github/workflows/ci.yml',
              'src/__init__.py',
              'src/data_processing.py',
              'src/train.py',
              'src/predict.py',
              'src/api/main.py',
              'src/api/pydantic_models.py',
              'tests/test_data_processing.py',
              'notebooks/eda.ipynb',
          ]
          missing = [f for f in required if not Path(f).exists()]
          if missing:
              print('Missing files:')
              for f in missing:
                  print(f'  - {f}')
              raise SystemExit(1)
          print(f'All {len(required)} required files present.')
          "
